name: Build

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - run: pip install pyinstaller schedule requests
    - run: pyinstaller --onefile --windowed --name StockMonitor stock_monitor.py
    - run: cd dist && zip -r StockMonitor-mac.zip StockMonitor
    - uses: actions/upload-artifact@v3
      with:
        name: mac
        path: dist/StockMonitor-mac.zip

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - run: pip install pyinstaller schedule requests
    - run: pyinstaller --onefile --windowed --name StockMonitor stock_monitor.py
    - run: cd dist; tar -czf StockMonitor-windows.zip StockMonitor.exe
      shell: powershell
    - uses: actions/upload-artifact@v3
      with:
        name: win
        path: dist/StockMonitor-windows.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v3
    - uses: softprops/action-gh-release@v1
      with:
        files: |
          mac/StockMonitor-mac.zip
          win/StockMonitor-windows.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
