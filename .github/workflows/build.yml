name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install schedule requests
    
    - name: Build macOS app
      run: |
        pyinstaller --onefile --windowed \
          --name StockMonitor \
          --add-data "config.example.json:." \
          --hidden-import schedule \
          --hidden-import requests \
          --hidden-import sqlite3 \
          stock_monitor.py
    
    - name: Package macOS app
      run: |
        cd dist && zip -r StockMonitor-mac.zip StockMonitor
        ls -la
    
    - name: Upload macOS artifact
      uses: actions/upload-artifact@v3
      with:
        name: StockMonitor-mac
        path: dist/StockMonitor-mac.zip

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install schedule requests
    
    - name: Build Windows executable
      run: |
        pyinstaller --onefile --windowed `
          --name StockMonitor `
          --add-data "config.example.json;." `
          --hidden-import schedule `
          --hidden-import requests `
          --hidden-import sqlite3 `
          stock_monitor.py
      shell: pwsh
    
    - name: Package Windows exe
      run: |
        cd dist
        7z a StockMonitor-windows.zip StockMonitor.exe
        dir
      shell: cmd
    
    - name: Upload Windows artifact
      uses: actions/upload-artifact@v3
      with:
        name: StockMonitor-windows
        path: dist/StockMonitor-windows.zip

  create-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    
    steps:
    - name: Download macOS artifact
      uses: actions/download-artifact@v3
      with:
        name: StockMonitor-mac
        path: dist/
    
    - name: Download Windows artifact
      uses: actions/download-artifact@v3
      with:
        name: StockMonitor-windows
        path: dist/
    
    - name: List files
      run: ls -la dist/
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/StockMonitor-mac.zip
          dist/StockMonitor-windows.zip
        body: |
          🎉 New Release!
          
          ## 📦 Downloads
          
          | Platform | File | Size |
          |----------|------|------|
          | macOS | StockMonitor-mac.zip | ~17MB |
          | Windows | StockMonitor-windows.zip | ~12MB |
          
          ## 🚀 Quick Start
          1. Download for your platform
          2. Extract and run
          3. Enter Bark Key on first run
          4. Done!
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
