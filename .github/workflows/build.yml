name: Build & Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: Build macOS app
      run: |
        python build_mac.py
    
    - name: Package macOS app
      run: |
        cd dist && zip -r StockMonitor-mac.zip StockMonitor.app
    
    - name: Upload macOS artifact
      uses: actions/upload-artifact@v3
      with:
        name: StockMonitor-mac
        path: dist/StockMonitor-mac.zip

  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: Build Windows executable
      run: |
        python build_windows.py
    
    - name: Package Windows exe
      run: |
        cd dist
        7z a StockMonitor-windows.zip StockMonitor.exe
    
    - name: Upload Windows artifact
      uses: actions/upload-artifact@v3
      with:
        name: StockMonitor-windows
        path: dist/StockMonitor-windows.zip

  create-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Download macOS artifact
      uses: actions/download-artifact@v3
      with:
        name: StockMonitor-mac
        path: dist/
    
    - name: Download Windows artifact
      uses: actions/download-artifact@v3
      with:
        name: StockMonitor-windows
        path: dist/
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/StockMonitor-mac.zip
          dist/StockMonitor-windows.zip
        body: |
          🎉 New Release!
          
          ## 📦 Downloads
          
          | Platform | File | Size |
          |----------|------|------|
          | macOS | StockMonitor-mac.zip | ~17MB |
          | Windows | StockMonitor-windows.zip | ~12MB |
          
          ## 🚀 Quick Start
          1. Download the zip for your platform
          2. Extract and run
          3. Enter Bark Key on first run
          4. Done!
          
          ---
          
          🎉 新版本发布！
          
          ## 📦 下载
          
          | 平台 | 文件 | 大小 |
          |------|------|------|
          | macOS | StockMonitor-mac.zip | ~17MB |
          | Windows | StockMonitor-windows.zip | ~12MB |
          
          ## 🚀 快速开始
          1. 下载对应平台的 zip 文件
          2. 解压并运行
          3. 首次运行输入 Bark Key
          4. 完成！
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
